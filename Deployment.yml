kind: Namespace
apiVersion: v1
metadata:
  name: my-namespace

---

kind: Deployment
apiVersion: apps/v1
metadata:
  namespace: my-namespace
  name: nginx-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:	
	labels:
        app: nginx

    spec:
      containers:
        - name: nginx-cont
          image: nginx:latest
          ports:
            - containerPort: 80
